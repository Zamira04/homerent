<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 | 悦居 HomeNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">
          <span class="brand-mark">悦</span>
          <div>
            <strong>悦居 HomeNest</strong>
            <span>登录你的专属账户</span>
          </div>
        </a>
        <button class="menu-toggle" id="menuToggle" aria-label="打开菜单">☰</button>
        <nav class="main-nav" id="mainNav">
          <a href="index.html">首页</a>
          <a href="catalog.html">房源列表</a>
          <a href="details.html">房源详情</a>
          <a href="booking.html">在线预订</a>
          <a href="login.html">登录</a>
          <a href="register.html" class="nav-cta">免费注册</a>
        </nav>
      </div>
    </header>

    <main class="auth-page-shell">
      <section class="auth-visual-panel">
        <div class="auth-visual-content">
          <span class="section-kicker">会员中心</span>
          <h1>欢迎回来，继续查看你的理想房源</h1>
          <p>登录后可保存浏览记录、快速预约看房、同步收藏清单，并管理你的在线预订信息。</p>

          <div class="auth-benefit-list">
            <div>✔ 收藏心仪房源</div>
            <div>✔ 获取专属推荐</div>
            <div>✔ 管理预约记录</div>
          </div>
        </div>
      </section>

      <section class="auth-form-panel">
        <div class="auth-card-pro">
          <div class="auth-card-header">
            <h2>账户登录</h2>
            <p>请输入你的注册邮箱和密码</p>
          </div>

          <form class="auth-form-pro">
            <div class="input-group">
              <label for="loginEmail">邮箱地址</label>
              <input id="loginEmail" type="email" placeholder="请输入邮箱地址" required />
            </div>
            <div class="input-group">
              <label for="loginPassword">登录密码</label>
              <input id="loginPassword" type="password" placeholder="请输入密码" required />
            </div>

            <div class="auth-row-between">
              <label class="checkbox-line">
                <input type="checkbox" /> 记住我
              </label>
              <a href="#">忘记密码？</a>
            </div>

            <button class="btn btn-primary full-width" type="submit">立即登录</button>
          </form>

          <div class="auth-divider"><span>或</span></div>

          <button class="social-btn" type="button">使用手机号快捷登录</button>

          <p class="auth-switch-text">
            还没有账户？<a href="register.html">立即创建</a>
          </p>
        </div>
      </section>
    </main>

    <script>
      const menuToggle = document.getElementById("menuToggle");
      const mainNav = document.getElementById("mainNav");
      menuToggle.addEventListener("click", () => mainNav.classList.toggle("active"));
    </script>
  </body>
</html>
